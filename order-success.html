<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الطلب بنجاح | F&S Fragrances</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .success-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
        }
        .success-card {
            background: rgba(26, 26, 26, 0.95);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .success-icon {
            font-size: 4rem;
            color: #2ecc71;
            margin-bottom: 20px;
            animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .success-card h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #fff;
        }
        .success-card p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .order-summary-box {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: right;
        }
        .order-summary-box h4 {
            color: var(--accent);
            margin-bottom: 15px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        .summary-row span {
            color: var(--text-muted);
        }
        .summary-row strong {
            color: #fff;
        }
        .success-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        @media (min-width: 480px) {
            .success-buttons {
                flex-direction: row;
                justify-content: center;
            }
        }
        @keyframes scaleUp {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="container flex-between">
            <div class="top-contacts">
                <a href="tel:+201276713027"><i class="fa-solid fa-phone"></i> +20 12 76713027</a>
            </div>
            <div class="top-promo">تم إرسال الطلب بنجاح</div>
            <div class="top-links flex">
                <a href="index.html" class="btn btn-outline" style="color:white;">العودة للمتجر</a>
            </div>
        </div>
    </div>

    <main class="success-page container">
        <div class="success-card">
            <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
            <h2>نشكرك على طلبك!</h2>
            <p>تم استلام طلبك بنجاح وجاري تجهيزه الآن.</p>

            <div class="order-summary-box">
                <h4>تفاصيل الطلب</h4>
                <div class="summary-row">
                    <span>رقم الطلب:</span>
                    <strong id="order-id">-</strong>
                </div>
                <div class="summary-row">
                    <span>الاسم الكامل:</span>
                    <strong id="order-name">-</strong>
                </div>
                <div class="summary-row">
                    <span>رقم التليفون:</span>
                    <strong id="order-phone">-</strong>
                </div>
                <div class="summary-row">
                    <span>العنوان:</span>
                    <strong id="order-address">-</strong>
                </div>
                <div class="summary-row" style="margin-top: 15px; border-top: 1px dashed #333; padding-top: 15px;">
                    <span>الإجمالي:</span>
                    <strong id="order-total" style="color: var(--accent); font-size: 1.2rem;">0 جنيه</strong>
                </div>
            </div>

            <div class="success-buttons">
                <button id="whatsapp-btn" class="btn btn-gold"><i class="fa-brands fa-whatsapp"></i> تأكيد عبر الواتساب</button>
                <a href="index.html" class="btn btn-outline" style="border: 1px solid white; color: white;">العودة إلى المتجر</a>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentTheme = localStorage.getItem('theme') || 'dark';
            if (currentTheme === 'light') {
                document.body.classList.add('light-mode');
            }

            // Retrieve order data from sessionStorage/localStorage
            const orderData = JSON.parse(sessionStorage.getItem('last_order') || '{}');
            if (orderData.id) {
                document.getElementById('order-id').innerText = `#${orderData.id}`;
                document.getElementById('order-name').innerText = orderData.customer_name || '';
                document.getElementById('order-phone').innerText = orderData.phone || '';
                document.getElementById('order-address').innerText = orderData.address || '';
                document.getElementById('order-total').innerText = `${orderData.total_price} جنيه`;

                // Set up whatsapp action
                const whatsappBtn = document.getElementById('whatsapp-btn');
                if (whatsappBtn) {
                    const whatsappNumber = '201276713027';
                    const itemsSummary = (orderData.items || []).map(item => `• ${item.product_name || 'منتج'} [العدد: ${item.quantity}]`).join('\n');
                    const whatsappMessage = `*تأكيد طلب جديد من الموقع* 🛍️\n` +
                        `--------------------------\n` +
                        `📦 *رقم الطلب:* #${orderData.id}\n` +
                        `👤 *الاسم:* ${orderData.customer_name}\n` +
                        `📞 *الهاتف:* ${orderData.phone}\n` +
                        `📍 *العنوان:* ${orderData.address}\n\n` +
                        `*المنتجات:*\n${itemsSummary}\n\n` +
                        `💰 *الإجمالي النهائي:* ${orderData.total_price} جنيه`;

                    whatsappBtn.addEventListener('click', () => {
                        window.location.href = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(whatsappMessage)}`;
                    });
                }
            } else {
                // If no order data, redirect to index
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
