<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | F&S Fragrances</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="top-bar">
        <div class="container flex-between">
            <div class="top-contacts">
                <a href="https://wa.me/201276713027" target="_blank"><i class="fa-brands fa-whatsapp"></i> واتساب</a>
            </div>
            <div class="top-promo">لوحة تحكم الإدارة — Real-Time</div>

            </div>
        </div>
    </div>

    <main class="admin-main container py">
        <header class="admin-header">
            <div>
                <h2>لوحة الإدارة</h2>
                <p>إدارة المنتجات والطلبات والعملاء — تحديث لحظي عبر WebSocket</p>

                <span class="admin-badge">F&S Fragrances</span>
            </div>
        </header>

        <section id="orders-section" class="admin-grid">
            <div class="admin-panel full-width">
                <div class="panel-head">
                    <h3>الطلبات الواردة</h3>
                    <span id="orders-count">0</span>
                </div>
                <div id="orders-list" class="orders-list">
                    <p class="empty-state">لا توجد طلبات بعد.</p>
                </div>
            </div>
        </section>
    </main>

    <nav class="app-bottom-nav">
        <a href="#orders-section" class="nav-item active" data-section="orders">
            <i class="fa-solid fa-house"></i>
            <span>الطلبات</span>
        </a>
        <a href="#products-section" class="nav-item" data-section="products">
            <i class="fa-solid fa-box"></i>
            <span>المنتجات</span>
        </a>
        <a href="#customers-section" class="nav-item" data-section="customers">
            <i class="fa-solid fa-users"></i>
            <span>العملاء</span>
        </a>
        <a href="admin-login.html" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>الحساب</span>
        </a>
    </nav>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="api-config.js"></script>
    <script src="api.js"></script>
    <script src="socket-client.js"></script>
    <script src="admin-dashboard.js"></script>
</body>
</html>
