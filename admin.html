<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | F&S Fregrances</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="top-bar">
        <div class="container flex-between">
            <div class="top-contacts">
                <a href="https://wa.me/201276713027" target="_blank"><i class="fa-brands fa-whatsapp"></i> واتساب</a>
            </div>
            <div class="top-promo">لوحة تحكم الإدارة</div>
            <div class="top-links flex">
                <a href="index.html" class="btn btn-outline" style="color:white;">العودة للمتجر</a>
            </div>
        </div>
    </div>

    <main class="admin-main container py">
        <header class="admin-header">
            <div>
                <h2>لوحة الإدارة</h2>
                <p>إدارة الطلبات والمنتجات المعروضة على الموقع.</p>
            </div>
            <div class="admin-header-actions">
                <button id="show-products-btn" class="btn btn-gold"><i class="fa-solid fa-box"></i> عرض منتجات الموقع</button>
                <button id="clear-cache-btn" class="btn btn-outline" style="border-color:#e74c3c;color:#e74c3c;" onclick="if(confirm('هل تريد مسح كاش المنتجات؟ ستظهر التعديلات من script.js مباشرة.')){localStorage.removeItem('fs_admin_products');localStorage.removeItem('fs_admin_products_sync');alert('✅ تم مسح الكاش! يتم إعادة تحميل الصفحة...');location.reload();}"><i class="fa-solid fa-rotate"></i> مسح كاش المنتجات</button>
                <button id="logout-btn" class="btn btn-outline">تسجيل خروج</button>
                <span class="admin-badge">F&S Fregrances</span>
            </div>
        </header>

        <section id="orders-section" class="admin-grid">
            <div class="admin-panel full-width">
                <div class="panel-head">
                    <h3>الطلبات الواردة</h3>
                    <span id="orders-count">0</span>
                </div>
                <div id="orders-list" class="orders-list">
                    <p class="empty-state">لا توجد طلبات بعد.</p>
                </div>
            </div>
        </section>
    </main>
    <nav class="app-bottom-nav">
        <a href="#orders-section" class="nav-item active" data-section="orders">
            <i class="fa-solid fa-house"></i>
            <span>الطلبات</span>
        </a>
        <a href="#products-section" class="nav-item" data-section="products">
            <i class="fa-solid fa-box"></i>
            <span>المنتجات</span>
        </a>
        <!-- باقي الروابط كما هي -->
        <a href="login.html" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>الحساب</span>
        </a>
        <a href="https://wa.me/201276713027" class="nav-item" target="_blank">
            <i class="fa-brands fa-whatsapp"></i>
            <span>واتساب</span>
        </a>
    </nav>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <script src="script.js"></script>
    <script src="admin.js"></script>
</body>
</html>
