<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | F&S Fregrances</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="top-bar">
        <div class="container flex-between">
            <div class="top-contacts">
                <a href="tel:+201276713027"><i class="fa-solid fa-phone"></i> +20 12 76713027</a>
            </div>
            <div class="top-promo">صفحة إتمام الطلب</div>
            <div class="top-links flex">
                <a href="index.html" class="btn btn-outline" style="color:white;">العودة للمتجر</a>
            </div>
        </div>
    </div>

    <main class="checkout-page container py">
        <div class="checkout-grid">
            <section class="checkout-panel">
                <h3>ملخص الطلب</h3>
                <div id="checkout-items" class="checkout-items"></div>
                <div class="checkout-total">
                    <span>الإجمالي</span>
                    <strong id="checkout-total">0 جنيه</strong>
                </div>
            </section>

            <section class="checkout-panel">
                <h3>بيانات العميل</h3>
                <form id="checkout-form" class="checkout-form">
                    <label>الاسم الكامل
                        <input type="text" id="customer-name" placeholder="الاسم بالكامل" required>
                    </label>
                    <label>رقم التليفون
                        <input type="tel" id="customer-phone" placeholder="رقم التليفون" required>
                    </label>
                    <label>العنوان
                        <textarea id="customer-address" placeholder="العنوان الكامل" rows="4" required></textarea>
                    </label>
                    <button type="submit" class="btn btn-gold">إتمام الطلب</button>
                </form>
                <p id="checkout-message" class="form-message" role="alert" aria-live="polite"></p>
            </section>
        </div>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="api-config.js"></script>
    <script src="api.js"></script>

    <script src="checkout.js"></script>
</body>
</html>
